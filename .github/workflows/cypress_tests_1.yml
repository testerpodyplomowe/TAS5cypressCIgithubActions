name: CypressTests1_maj # nazwa pipeline'u
on: [push, workflow_dispatch]

jobs:
  cypress:
    runs-on: ubuntu-latest # uruchamia na najnowszym ubuntu uwaga w chmurze !!! nie musisz go miec

    steps:
      - uses: actions/checkout@v6 # krok 1 zrob checkout z repo z ktorego bierzesz kod 
      - uses: actions/setup-node@v6 # krok 2 zainstaluj srodowisko nodejs
        with:
          node-version: 24 # sami okreslamy
          cache: npm

      - run: npm ci # uruchom skrypty npm w srodowisku ciaglej integracji 
  #   - run: npx cypress run
      - run: npx cypress run --record
        env: 
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}

