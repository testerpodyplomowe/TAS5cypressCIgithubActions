name: CypressTests_bez_DOCKERA # nazwa pipeline'u (widoczna w GitHub Actions)
on: [push, pull_request, workflow_dispatch]

jobs:
  cypress:
    runs-on: ubuntu-latest # GitHub tworzy świeży Linux (runner); # uruchamia na najnowszym ubuntu - uwaga w chmurze ! (nie musisz miec tego linuxa u siebie na kompie)

    steps:
      - name: Checkout repo 
        uses: actions/checkout@v6 # pobiera Twój kod z repozytorium (Dockerfile, testy, config)
      - uses: actions/setup-node@v6 # krok 2 zainstaluj srodowisko nodejs
        with:
          node-version: 24 # sami okreslamy
          cache: npm

      - run: npm ci # uruchom skrypty npm w srodowisku ciaglej integracji
      #   - run: npx cypress run
      - run: npx cypress run --record
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          # przekazuje secret czyli ten kod taki token dla bezpieczenstwa
